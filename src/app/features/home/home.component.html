<div class="mx-auto w-full max-w-[1600px]">
  <div class="px-6 py-10">
    <app-hero-section />
  </div>
  <div class="px-6">
    <app-trust-bar />
  </div>

  <div class="px-6 py-10">
    <app-category-grid />
  </div>

  <div class="px-6 py-10">
    <app-split-promo-section [products]="bestsellers()" />
  </div>

  <div class="px-6 py-10">
    <app-product-carousel
      title="Más recientes"
      [viewAllRoute]="'/products'"
      [viewAllQueryParams]="{ sortBy: 'recent' }"
      [products]="newArrivals()"
      [loading]="newArrivalsLoading()"
      [error]="newArrivalsError()"
    />
  </div>

  <div class="px-6 py-10">
    <app-featured-dual
      [primary]="{ imageUrl: '/images/featured-korg.webp', slug: 'korg-phase-8' }"
      [secondary]="{ imageUrl: '/images/featured-helix.webp', slug: 'helix' }"
    />
  </div>

  <div class="px-6 py-10">
    <app-product-carousel
      title="Más populares"
      [viewAllRoute]="'/products'"
      [viewAllQueryParams]="{ sortBy: 'popular' }"
      [products]="bestsellers()"
      [loading]="bestsellersLoading()"
      [error]="bestsellersError()"
    />
  </div>

  <div class="px-6 py-10">
    <app-split-promo-section [products]="mostFavorited()" />
  </div>

  <div class="px-6 py-10">
    <app-product-carousel
      title="Más favoritos"
      [viewAllRoute]="'/products'"
      [products]="mostFavorited()"
      [loading]="mostFavoritedLoading()"
      [error]="mostFavoritedError()"
    />
  </div>

  <div class="px-6 py-10">
    <app-callout-signup />
  </div>
</div>
