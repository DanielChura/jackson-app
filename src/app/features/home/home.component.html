<div class="mx-auto max-w-7xl space-y-10 px-6 py-8">
  <section class="relative overflow-hidden rounded-2xl">
    <div class="flex transition-transform duration-500" [style.transform]="'translateX(-' + currentSlide() * 100 + '%)'">
      @for (src of banners; track $index) {
        <img [src]="src" [alt]="'Banner ' + ($index + 1)" class="h-44 w-full shrink-0 object-cover md:h-[360px]" />
      }
    </div>
    <div class="absolute bottom-4 left-1/2 flex -translate-x-1/2 gap-2">
      @for (_ of banners; track $index) {
        <button (click)="goToSlide($index)" [class.bg-white]="$index === currentSlide()" [class.bg-white/50]="$index !== currentSlide()" class="h-2.5 w-2.5 rounded-full transition-colors"></button>
      }
    </div>
  </section>

  <div class="flex flex-col gap-4 md:flex-row md:items-center">
    <input
      #searchInput
      type="text"
      placeholder="Buscar productos..."
      (input)="onSearch(searchInput.value)"
      class="w-full rounded-lg border border-gray-200 px-4 py-3 text-base focus:border-orange-500 focus:outline-none focus:ring-2 focus:ring-orange-500/20 md:w-80"
      style="font-weight:400"
    />
    <select
      (change)="onCategoryChange($any($event.target).value)"
      class="w-full rounded-lg border border-gray-200 px-4 py-3 text-base focus:border-orange-500 focus:outline-none focus:ring-2 focus:ring-orange-500/20 md:w-64"
      style="font-weight:400"
    >
      <option value="">Todas las categorías</option>
      @for (cat of categories(); track cat.id) {
        <option [value]="cat.id">{{ cat.name }}</option>
      }
    </select>
  </div>

  @if (loading()) {
    <div class="flex justify-center py-20">
      <app-spinner size="36" text="Cargando productos…" />
    </div>
  } @else if (products().length === 0) {
    <div class="rounded-2xl border border-gray-200 bg-white p-16 text-center">
      <p class="text-gray-400" style="font-weight:400">No hay productos disponibles</p>
    </div>
  } @else {
    <div class="grid gap-8 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4">
      @for (product of products(); track product.id) {
        <app-product-card [product]="product" />
      }
    </div>

    <app-paginator
      [page]="page()"
      [totalPages]="totalPages()"
      [totalElements]="totalElements()"
      label="productos"
      (prev)="prev()"
      (next)="next()"
    />
  }
</div>
