<div class="grid grid-cols-1 gap-4 sm:grid-cols-5">
  <a
    [routerLink]="['/products', primary().slug]"
    class="sm:col-span-3 block overflow-hidden rounded-md"
  >
    <img [src]="primary().imageUrl" alt="" class="h-full w-full object-cover" loading="lazy" />
  </a>
  <a
    [routerLink]="['/products', secondary().slug]"
    class="sm:col-span-2 block overflow-hidden rounded-md"
  >
    <img [src]="secondary().imageUrl" alt="" class="h-full w-full object-cover" loading="lazy" />
  </a>
</div>
