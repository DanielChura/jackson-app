<section class="bg-white py-12 md:py-20">
  <div class="mx-auto w-full max-w-[1600px] px-6">
    <h2 class="mb-8 text-2xl text-gray-900 md:text-3xl lg:mb-10" style="font-weight: 500">
      La diferencia Jackson
    </h2>

    <div class="grid gap-8 lg:grid-cols-2 lg:gap-12 lg:max-h-[580px]">
      <!-- ===== IMAGE PANEL ===== -->
      <div
        class="relative overflow-hidden bg-gray-50 max-lg:aspect-[4/3] lg:h-full"
        aria-live="polite"
      >
        @for (prop of props; track prop.title; let i = $index) {
          <img
            [src]="prop.image"
            [alt]="i === selectedIndex() ? prop.imageAlt : ''"
            [attr.aria-hidden]="i !== selectedIndex()"
            [class.opacity-100]="i === selectedIndex()"
            [class.opacity-0]="i !== selectedIndex()"
            class="absolute inset-0 h-full w-full object-cover transition-opacity duration-500 ease-in-out"
            loading="lazy"
          />
        }
      </div>

      <!-- ===== PROPS LIST ===== -->
      <div class="flex flex-col justify-center overflow-y-auto">
        @for (prop of props; track prop.title; let i = $index) {
          <button
            type="button"
            (click)="selectProp(i)"
            [class.bg-gray-50]="selectedIndex() === i"
            class="flex w-full items-start gap-5 border-b border-gray-100 bg-white px-5 py-5 text-left transition-all duration-200 hover:bg-gray-50 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-gray-300 focus-visible:ring-offset-2 last:border-b-0 lg:px-6 lg:py-6"
          >
            <!-- Icon -->
            <app-icon
              [name]="prop.icon"
              size="36"
              [class.text-gray-700]="selectedIndex() === i"
              [class.text-gray-300]="selectedIndex() !== i"
              class="shrink-0 mt-0.5 transition-colors duration-200"
            />

            <!-- Text -->
            <div class="min-w-0">
              <span
                class="block text-base leading-snug text-gray-900 lg:text-lg"
                style="font-weight: 500"
              >
                {{ prop.title }}
              </span>
              <p
                [class.text-gray-600]="selectedIndex() === i"
                [class.text-gray-400]="selectedIndex() !== i"
                class="mt-1 text-sm leading-relaxed transition-colors duration-200 lg:text-base"
                style="font-weight: 400"
              >
                {{ prop.description }}
              </p>
            </div>
          </button>
        }
      </div>
    </div>
  </div>
</section>
