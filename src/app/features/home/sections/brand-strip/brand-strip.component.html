<section class="bg-jackson-white py-6 md:py-10">
  <div class="mx-auto w-full max-w-[1600px] px-6">
    <div class="mb-8 flex items-center justify-between">
      <h2 class="text-2xl text-jackson-text md:text-3xl font-medium">Marcas</h2>
      <div class="flex items-center gap-2">
        <button
          (click)="scrollLeft()"
          class="flex h-10 w-10 items-center justify-center rounded-full text-jackson-text/50 transition-colors hover:bg-jackson-surface"
        >
          <app-icon name="chevron-left" size="20" />
        </button>
        <button
          (click)="scrollRight()"
          class="flex h-10 w-10 items-center justify-center rounded-full text-jackson-text/50 transition-colors hover:bg-jackson-surface"
        >
          <app-icon name="chevron-right" size="20" />
        </button>
      </div>
    </div>

    @if (loading()) {
      <div class="flex items-center justify-center py-20">
        <span class="text-jackson-text/40 font-medium">Cargando marcas...</span>
      </div>
    } @else if (error(); as err) {
      <div class="flex items-center justify-center py-20">
        <span class="text-jackson-text/40 font-medium">{{ err }}</span>
      </div>
    } @else {
      <div
        #scrollContainer
        class="flex gap-4 overflow-x-auto pb-4 snap-x snap-proximity scroll-smooth md:gap-5 [&::-webkit-scrollbar]:hidden [-ms-overflow-style:none] [scrollbar-width:none]"
      >
        @for (brand of brands(); track brand.id) {
          <a
            [routerLink]="['/products']"
            [queryParams]="{ brand: brand.id }"
            class="relative aspect-[3/4] w-[calc(50%-0.5rem)] shrink-0 snap-start overflow-hidden md:w-[calc(25%-0.9375rem)]"
          >
            <img
              [src]="brand.logoUrl ?? ''"
              [alt]="brand.name"
              class="h-full w-full object-contain p-6"
              loading="lazy"
            />
          </a>
        }
      </div>
    }
  </div>
</section>
