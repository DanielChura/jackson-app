<div>
  <div
    class="relative w-full overflow-hidden rounded-2xl"
    (mouseenter)="stopAutoPlay()"
    (mouseleave)="startAutoPlay()"
  >
    <div
      class="flex transition-transform duration-500 ease-out"
      [style.transform]="'translateX(-' + currentIndex() * 100 + '%)'"
    >
      @for (slide of slides(); track $index) {
        <div class="w-full shrink-0">
          <a [routerLink]="slide.routerLink" [queryParams]="slide.queryParams" class="block w-full">
            <picture class="block w-full aspect-4/3 md:aspect-[14/5] overflow-hidden">
              <source media="(max-width: 767px)" [srcset]="slide.mobileImageUrl" />
              <img
                [src]="slide.imageUrl"
                [alt]="slide.alt"
                class="w-full h-full object-cover"
                loading="eager"
                fetchpriority="high"
              />
            </picture>
          </a>
        </div>
      }
    </div>

    <div class="absolute bottom-5 left-0 right-0 flex justify-center gap-2">
      @for (slide of slides(); track $index) {
        <button
          (click)="goToSlide($index)"
          [attr.aria-label]="'Ir a la promoción ' + slide.label"
          class="h-1 cursor-pointer"
          [class]="currentIndex() === $index ? 'w-8 bg-white' : 'w-3 bg-white/30 hover:bg-white/60'"
        ></button>
      }
    </div>
  </div>
</div>
