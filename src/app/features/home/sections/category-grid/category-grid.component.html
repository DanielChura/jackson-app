<section id="category-grid" class="mx-auto w-full max-w-[1600px] px-6 py-12 md:py-20">
  <div class="mb-8 flex items-center justify-between">
    <h2 class="text-2xl text-gray-900 md:text-3xl" style="font-weight: 500">Categorías</h2>
    <div class="flex items-center gap-2">
      <button
        (click)="scrollLeft()"
        class="flex h-10 w-10 items-center justify-center rounded-full border border-gray-200 text-gray-600 transition-colors hover:bg-gray-50"
      >
        <app-icon name="chevron-left" size="20" />
      </button>
      <button
        (click)="scrollRight()"
        class="flex h-10 w-10 items-center justify-center rounded-full border border-gray-200 text-gray-600 transition-colors hover:bg-gray-50"
      >
        <app-icon name="chevron-right" size="20" />
      </button>
    </div>
  </div>

  <div
    #scrollContainer
    class="flex gap-4 overflow-x-auto pb-4 snap-x snap-proximity scroll-smooth md:gap-5 [&::-webkit-scrollbar]:hidden [-ms-overflow-style:none] [scrollbar-width:none]"
  >
    @for (cat of categories; track cat.slug) {
      <a
        [routerLink]="['/products']"
        [queryParams]="{ category: cat.slug }"
        class="relative aspect-[3/4] w-[calc(50%-0.5rem)] shrink-0 snap-start overflow-hidden md:w-[calc(25%-0.9375rem)]"
      >
        <img [src]="cat.image" [alt]="cat.name" class="h-full w-full object-cover" loading="lazy" />
      </a>
    }
  </div>
</section>
