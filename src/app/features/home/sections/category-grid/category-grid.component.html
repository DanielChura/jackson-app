<section id="category-grid" class="mx-auto w-full max-w-[1600px] px-6 py-6 md:py-10">
  @if (loading()) {
    <div class="flex items-center justify-center py-20">
      <span class="text-jackson-text/40 font-medium">Cargando categorías...</span>
    </div>
  } @else if (error(); as err) {
    <div class="flex items-center justify-center py-20">
      <span class="text-jackson-text/40 font-medium">{{ err }}</span>
    </div>
  } @else {
    <div class="mb-8 flex items-center justify-between">
      <h2 class="text-2xl text-jackson-text md:text-3xl font-medium">Categorías</h2>
      <div class="flex items-center gap-2">
        <button
          (click)="scrollLeft()"
          class="flex h-10 w-10 items-center justify-center rounded-full text-jackson-text/50 transition-colors hover:bg-jackson-surface"
        >
          <app-icon name="chevron-left" size="20" />
        </button>
        <button
          (click)="scrollRight()"
          class="flex h-10 w-10 items-center justify-center rounded-full text-jackson-text/50 transition-colors hover:bg-jackson-surface"
        >
          <app-icon name="chevron-right" size="20" />
        </button>
      </div>
    </div>

    <div
      #scrollContainer
      class="flex gap-4 overflow-x-auto pb-4 snap-x snap-proximity scroll-smooth md:gap-5 [&::-webkit-scrollbar]:hidden [-ms-overflow-style:none] [scrollbar-width:none]"
    >
      @for (cat of categories(); track cat.id) {
        <a
          [routerLink]="['/products']"
          [queryParams]="{ category: cat.id }"
          class="relative aspect-[3/4] w-[calc(50%-0.5rem)] shrink-0 snap-start overflow-hidden md:w-[calc(25%-0.9375rem)]"
        >
          @if (cat.imageUrl) {
            <img
              [src]="cat.imageUrl"
              [alt]="cat.name"
              class="h-full w-full object-cover"
              loading="lazy"
            />
          } @else {
            <div class="flex h-full w-full items-center justify-center bg-jackson-surface">
              <span class="text-sm text-jackson-text/30 font-medium text-center px-4 leading-tight">
                {{ cat.name }}
              </span>
            </div>
          }
        </a>
      }
    </div>
  }
</section>
