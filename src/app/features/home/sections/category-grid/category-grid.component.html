<section class="py-6">
  <div class="flex items-center justify-between mb-6">
    <h2 class="text-2xl md:text-xl lg:text-2xl font-medium text-jackson-charcoal">
      Categorías Destacadas
    </h2>
    <a
      [routerLink]="['/products']"
      [queryParams]="{ category: 'all' }"
      class="text-sm font-medium text-jackson-navy hover:text-jackson-navy-hover underline"
    >
      Ver todos
    </a>
  </div>

  @if (loading()) {
    <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-4 gap-4">
      @for (placeholder of [1, 2, 3, 4, 5, 6, 7, 8]; track placeholder) {
        <div class="aspect-3/2 bg-gray-100 animate-pulse rounded-lg"></div>
      }
    </div>
  } @else if (error()) {
    <div
      class="flex flex-col items-center justify-center py-12 bg-gray-100 rounded-lg text-center"
    >
      <p class="text-jackson-charcoal mb-4">{{ error() }}</p>
    </div>
  } @else {
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
      @for (category of displayCategories(); track category.id) {
        <a
          [routerLink]="['/products']"
          [queryParams]="{ category: category.id }"
          class="group block space-y-3"
        >
          <div class="overflow-hidden rounded-lg aspect-3/2">
            <img
              [src]="category.imageUrl ?? '/images/placeholder.webp'"
              [alt]="category.name"
              class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-105"
            />
          </div>
        </a>
      }
    </div>
  }
</section>
