<section class="bg-jackson-white">
  <div class="mb-10">
    <h2
      class="max-w-sm text-3xl md:text-2xl md:max-w-xs lg:text-3xl font-medium text-jackson-charcoal"
    >
      Esto es lo que opinan nuestros clientes
    </h2>
  </div>

  <div
    class="flex gap-4 overflow-x-auto pb-4 snap-x snap-proximity scroll-smooth scrollbar-none md:gap-5"
  >
    @for (t of testimonials; track $index) {
      @if (t.type === 'image') {
        <div
          class="flex w-[calc(80%-0.5rem)] shrink-0 snap-start aspect-3/4 md:w-[calc(35%-1rem)] md:aspect-2.5/3 lg:w-[calc(25%-1rem)] lg:aspect-4/5 overflow-hidden rounded-2xl bg-jackson-surface"
        >
          <img [src]="t.image" alt="Cliente Jackson Music" class="h-full w-full object-cover" />
        </div>
      } @else {
        <div
          class="relative flex w-[calc(80%-0.5rem)] shrink-0 snap-start flex-col justify-between rounded-2xl p-4 md:p-6 aspect-3/4 md:w-[calc(35%-1rem)] md:aspect-2.5/3 lg:w-[calc(25%-1rem)] lg:aspect-4/5 bg-jackson-surface text-jackson-charcoal overflow-hidden"
        >
          <p class="text-2xl md:text-lg lg:text-2xl leading-relaxed font-normal">
            {{ t.text }}
          </p>

          <div class="z-10">
            <p class="text-sm md:text-base font-medium">{{ t.author }}</p>
            <p class="text-xs md:text-sm font-normal text-jackson-text-secondary">
              {{ t.city }}
            </p>
          </div>

          <app-icon
            name="quote-open"
            size="140"
            fill="currentColor"
            class="absolute -bottom-1 -right-1 pointer-events-none text-jackson-charcoal/10"
          />
        </div>
      }
    }
  </div>
</section>
