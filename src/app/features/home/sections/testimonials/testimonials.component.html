<section class="bg-white py-6 md:py-10">
  <div class="mx-auto w-full max-w-[1600px] px-6">
    <div class="mb-10 flex items-center justify-between">
      <h2 class="max-w-sm text-3xl text-gray-900" style="font-weight: 500">
        Esto es lo que opinan nuestros clientes
      </h2>
      <div class="flex items-center gap-2">
        <button
          (click)="scrollLeft()"
          class="flex h-11 w-11 items-center justify-center rounded-full text-gray-400 transition-colors hover:text-gray-600"
        >
          <app-icon name="chevron-left" size="22" />
        </button>
        <button
          (click)="scrollRight()"
          class="flex h-11 w-11 items-center justify-center rounded-full text-gray-400 transition-colors hover:text-gray-600"
        >
          <app-icon name="chevron-right" size="22" />
        </button>
      </div>
    </div>

    <div
      #scrollContainer
      class="flex gap-4 overflow-x-auto pb-4 snap-x snap-mandatory scroll-smooth md:gap-5 [&::-webkit-scrollbar]:hidden [-ms-overflow-style:none] [scrollbar-width:none]"
    >
      @for (t of testimonials; track $index) {
        @if (t.type === 'image') {
          <div
            class="flex w-[calc(50%-0.75rem)] shrink-0 snap-start aspect-[3/4] md:w-[calc(25%-1.125rem)] overflow-hidden bg-gray-50"
          >
            <img [src]="t.image" alt="Cliente Jackson Music" class="h-full w-full object-cover" />
          </div>
        } @else {
          <div
            class="relative flex w-[calc(50%-0.75rem)] shrink-0 snap-start flex-col justify-between bg-gray-50 p-6 aspect-[3/4] md:w-[calc(25%-1.125rem)]"
          >
            <p class="text-base leading-relaxed text-gray-700 md:text-lg" style="font-weight: 400">
              {{ t.text }}
            </p>

            <div>
              <p class="text-sm font-semibold text-gray-900">{{ t.author }}</p>
              <p class="text-xs text-gray-400" style="font-weight: 400">{{ t.city }}</p>
            </div>

            <app-icon
              name="quote-open"
              size="180"
              fill="currentColor"
              class="absolute -bottom-1 -right-1 text-gray-200"
            />
          </div>
        }
      }
    </div>
  </div>
</section>
