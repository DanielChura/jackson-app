<section class="bg-white py-12 md:py-20">
  <div class="mx-auto w-full max-w-[1600px] px-6">
    <div class="mb-8 flex items-center justify-between">
      <h2 class="text-2xl text-gray-900 md:text-3xl" style="font-weight: 500">
        Lo que dicen nuestros clientes
      </h2>
      <div class="flex items-center gap-2">
        <button
          (click)="scrollLeft()"
          class="flex h-10 w-10 items-center justify-center rounded-full border border-gray-200 text-gray-600 transition-colors hover:bg-gray-50"
        >
          <app-icon name="chevron-left" size="20" />
        </button>
        <button
          (click)="scrollRight()"
          class="flex h-10 w-10 items-center justify-center rounded-full border border-gray-200 text-gray-600 transition-colors hover:bg-gray-50"
        >
          <app-icon name="chevron-right" size="20" />
        </button>
      </div>
    </div>

    <div
      #scrollContainer
      class="flex gap-5 overflow-x-auto pb-2 snap-x snap-mandatory scroll-smooth [&::-webkit-scrollbar]:hidden [-ms-overflow-style:none] [scrollbar-width:none]"
    >
      @for (t of testimonials; track t.author) {
        <div
          class="flex w-[85vw] shrink-0 snap-start flex-col justify-between border border-gray-200 bg-white p-6 md:w-[30vw] lg:w-[22vw]"
        >
          <div>
            <div class="flex gap-0.5">
              @for (_ of starsArray(t.rating); track $index) {
                <app-icon name="star" size="18" class="text-amber-400" />
              }
            </div>
            <p class="mt-4 leading-relaxed text-gray-600" style="font-weight: 400">
              "{{ t.text }}"
            </p>
          </div>
          <div class="mt-6 border-t border-gray-100 pt-4">
            <p class="text-sm text-gray-900" style="font-weight: 500">{{ t.author }}</p>
            <p class="text-sm text-gray-400" style="font-weight: 400">{{ t.city }}</p>
          </div>
        </div>
      }
    </div>
  </div>
</section>
