<section class="bg-white py-6 md:py-10">
  <div class="mx-auto w-full max-w-[1600px] px-6">
    <div class="flex items-center justify-between">
      <h2 class="text-2xl text-gray-900 md:text-3xl" style="font-weight: 500">Nuevos productos</h2>
      <a
        routerLink="/products"
        class="hidden text-sm text-orange-500 hover:text-orange-600 sm:inline"
        style="font-weight: 500"
      >
        Ver todos
      </a>
    </div>
    <div class="mt-8 grid gap-6 sm:grid-cols-2 lg:grid-cols-4">
      @for (product of products; track product.id) {
        <app-product-card [product]="product" />
      }
    </div>
    <div class="mt-6 text-center sm:hidden">
      <a
        routerLink="/products"
        class="text-sm text-orange-500 hover:text-orange-600"
        style="font-weight: 500"
      >
        Ver todos
      </a>
    </div>
  </div>
</section>
