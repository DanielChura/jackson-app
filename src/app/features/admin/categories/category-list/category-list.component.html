<div class="space-y-6">
  <div class="flex items-center justify-between">
    <div>
      <h1 class="text-2xl text-jackson-charcoal font-medium">Categorías</h1>
      <p class="mt-1 text-sm text-jackson-text-secondary font-normal">
        Gestioná las categorías de productos
      </p>
    </div>
    <a routerLink="/admin/categories/new" class="btn-orange">Nueva categoría</a>
  </div>

  @if (loading()) {
    <div class="flex justify-center py-12">
      <app-spinner size="32" text="Cargando…" />
    </div>
  } @else if (categories().length === 0) {
    <div class="rounded-md border border-gray-200 bg-white p-6 text-center">
      <p class="text-sm text-jackson-text-secondary font-normal">No hay categorías registradas</p>
    </div>
  } @else {
    <div class="overflow-hidden rounded-md border border-gray-200 bg-white">
      <table class="w-full text-sm">
        <thead>
          <tr
            class="border-b border-gray-200 bg-white text-left text-jackson-text-secondary font-medium"
          >
            <th class="px-6 py-3">Nombre</th>
            <th class="px-6 py-3">Descripción</th>
            <th class="text-center px-6 py-3">Acciones</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-200">
          @for (cat of categories(); track cat.id) {
            <tr class="hover:bg-gray-50">
              <td
                class="truncate px-6 py-4 text-sm text-jackson-charcoal font-medium max-w-[200px]"
              >
                {{ cat.name }}
              </td>
              <td
                class="truncate px-6 py-4 text-sm text-jackson-text-secondary font-normal max-w-[300px]"
              >
                {{ cat.description || '—' }}
              </td>
              <td class="text-center whitespace-nowrap px-6 py-4">
                <a
                  routerLink="/admin/categories/{{ cat.id }}/edit"
                  class="mr-3 text-sm text-jackson-navy font-medium hover:text-jackson-navy-hover"
                  >Editar</a
                >
                <button
                  (click)="delete(cat.id)"
                  class="text-sm text-red-600 font-medium hover:text-red-700"
                >
                  Eliminar
                </button>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>

    <app-paginator
      [page]="page()"
      [totalPages]="totalPages()"
      [totalElements]="totalElements()"
      label="categorías"
      (prev)="prev()"
      (next)="next()"
    />
  }
</div>
