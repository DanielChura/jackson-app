<div class="space-y-6">
  <div>
    <h1 class="text-2xl text-jackson-charcoal font-medium">Usuarios</h1>
    <p class="mt-1 text-sm text-jackson-charcoal/50 font-normal">Gestioná los usuarios registrados</p>
  </div>

  @if (loading()) {
    <div class="flex justify-center py-12">
      <app-spinner size="32" text="Cargando…" />
    </div>
  } @else if (users().length === 0) {
    <div class="border border-gray-100 bg-jackson-white p-6 text-center">
      <p class="text-sm text-jackson-charcoal/40 font-normal">No hay usuarios registrados</p>
    </div>
  } @else {
    <div class="overflow-hidden border border-gray-100 bg-jackson-white">
      <table class="w-full text-sm">
        <thead>
          <tr
            class="border-b border-gray-100 bg-jackson-white text-left text-jackson-charcoal/50 font-medium"
          >
            <th class="px-6 py-3">Nombre</th>
            <th class="px-6 py-3">Email</th>
            <th class="px-6 py-3">Rol</th>
            <th class="px-6 py-3 text-center">Acciones</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-100">
          @for (user of users(); track user.id) {
            <tr class="hover:bg-gray-100">
              <td class="px-6 py-4 text-jackson-charcoal font-medium">{{ user.firstName }}</td>
              <td class="px-6 py-4 text-jackson-charcoal/60 font-normal">{{ user.email }}</td>
              <td class="px-6 py-4">
                <span
                  class="inline-block px-3 py-1 text-xs font-medium"
                  [class]="
                    user.roleName === 'ADMIN'
                      ? 'text-jackson-navy bg-gray-100'
                      : 'text-jackson-charcoal/60 bg-gray-100'
                  "
                >
                  {{ user.roleName }}
                </span>
              </td>
              <td class="whitespace-nowrap px-6 py-4 text-center">
                <button
                  (click)="delete(user.id)"
                  class="text-sm text-jackson-charcoal/50 hover:text-jackson-charcoal font-medium"
                >
                  Eliminar
                </button>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>

    <app-paginator
      [page]="page()"
      [totalPages]="totalPages()"
      [totalElements]="totalElements()"
      label="usuarios"
      (prev)="prev()"
      (next)="next()"
    />
  }
</div>
