<div class="space-y-6">
  <div>
    <h1 class="text-2xl text-gray-900" style="font-weight:500">Usuarios</h1>
    <p class="mt-1 text-sm text-gray-500" style="font-weight:400">Gestioná los usuarios registrados</p>
  </div>

  @if (loading()) {
    <div class="flex justify-center py-12">
      <app-spinner size="32" text="Cargando…" />
    </div>
  } @else if (users().length === 0) {
    <div class="rounded-2xl border border-gray-200 bg-white p-6 text-center">
      <p class="text-sm text-gray-400" style="font-weight:400">No hay usuarios registrados</p>
    </div>
  } @else {
    <div class="overflow-hidden rounded-2xl border border-gray-200 bg-white">
      <table class="w-full text-sm">
        <thead>
          <tr class="border-b border-gray-100 bg-white text-left text-gray-400" style="font-weight:500">
            <th class="px-6 py-3">Nombre</th>
            <th class="px-6 py-3">Email</th>
            <th class="px-6 py-3">Rol</th>
            <th class="px-6 py-3 text-center">Acciones</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-50">
          @for (user of users(); track user.id) {
            <tr class="hover:bg-gray-50">
              <td class="px-6 py-4 text-gray-900" style="font-weight:500">{{ user.firstName }}</td>
              <td class="px-6 py-4 text-gray-500" style="font-weight:400">{{ user.email }}</td>
              <td class="px-6 py-4">
                <span class="inline-block rounded-full px-3 py-1 text-xs font-medium"
                  [class]="user.roleName === 'ADMIN' ? 'text-orange-600 bg-orange-50' : 'text-gray-600 bg-gray-100'">
                  {{ user.roleName }}
                </span>
              </td>
              <td class="whitespace-nowrap px-6 py-4 text-center">
                <button (click)="delete(user.id)" class="text-sm text-red-500 hover:text-red-600" style="font-weight:500">Eliminar</button>
              </td>
            </tr>
          }
        </tbody>
      </table>
    </div>

    <app-paginator
      [page]="page()"
      [totalPages]="totalPages()"
      [totalElements]="totalElements()"
      label="usuarios"
      (prev)="prev()"
      (next)="next()"
    />
  }
</div>
