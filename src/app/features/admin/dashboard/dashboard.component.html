<div class="space-y-6">
  <div class="flex flex-col gap-4 sm:flex-row sm:items-center sm:justify-between">
    <div>
      <h1 class="text-2xl text-gray-900" style="font-weight: 500">Dashboard</h1>
      <p class="mt-1 text-sm text-gray-500" style="font-weight: 400">Resumen general del negocio</p>
    </div>
    <app-date-range-picker [range]="range()" (rangeChange)="onRangeChange($event)" />
  </div>

  <app-kpi-cards [range]="range()" />

  <div class="grid gap-6 lg:grid-cols-3 min-h-[300px]">
    <div class="lg:col-span-2">
      <app-sales-chart [range]="range()" />
    </div>
    <div>
      <app-orders-by-status [range]="range()" (statusClick)="onStatusClick($event)" />
    </div>
  </div>

  <div class="grid gap-6 lg:grid-cols-2 min-h-[300px]">
    <app-top-products [range]="range()" />
    <app-recent-orders (orderClick)="onOrderClick($event)" />
  </div>
</div>
