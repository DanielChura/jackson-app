<div class="flex flex-wrap items-center gap-2">
  @for (preset of presets; track preset.id) {
    <button
      (click)="selectPreset(preset.id)"
      [class]="btnClass(preset.id)"
      class="cursor-pointer font-medium"
    >
      {{ preset.label }}
    </button>
  }

  @if (activePreset() === 'custom') {
    <div class="flex items-center gap-2">
      <input
        type="date"
        [ngModel]="customDesde()"
        (ngModelChange)="onCustomDesdeChange($event)"
        class="rounded-md-lg border border-gray-200 px-3 py-1.5 text-sm text-gray-700 cursor-pointer focus:outline-none focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500"
        style="font-weight: 400"
      />
      <span class="text-sm text-gray-400">a</span>
      <input
        type="date"
        [ngModel]="customHasta()"
        (ngModelChange)="onCustomHastaChange($event)"
        class="rounded-md-lg border border-gray-200 px-3 py-1.5 text-sm text-gray-700 cursor-pointer focus:outline-none focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500"
        style="font-weight: 400"
      />
    </div>
  }
</div>
