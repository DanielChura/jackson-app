<div class="rounded-md border border-gray-200 bg-white p-6 h-full flex flex-col gap-4">
  <div class="flex items-center justify-between">
    <h2 class="text-lg text-jackson-charcoal" style="font-weight: 500">Ventas por Período</h2>
    @if (!loading() && data()?.length) {
      <span class="text-sm text-jackson-text-secondary" style="font-weight: 400">
        Total: {{ totalSales() | currency: 'PEN' : 'symbol-narrow' : '1.2-2' }}
      </span>
    }
  </div>

  @if (loading()) {
    <div class="flex justify-center py-8">
      <app-spinner size="24" text="Cargando…" />
    </div>
  } @else if (error()) {
    <p class="text-sm text-red-500" style="font-weight: 400">{{ error() }}</p>
  } @else if (data()?.length === 0) {
    <p class="text-sm text-jackson-text-secondary" style="font-weight: 400">
      Sin ventas en el período seleccionado
    </p>
  } @else {
    <div class="relative flex-1" style="min-height: 250px">
      <canvas #salesCanvas></canvas>
    </div>
  }
</div>
