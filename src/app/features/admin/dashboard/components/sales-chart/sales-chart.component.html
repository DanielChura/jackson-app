<div class="rounded-2xl border border-gray-200 bg-white p-6 flex flex-col gap-4">
  <h2 class="text-lg text-gray-900" style="font-weight: 500">Ventas por Periodo</h2>

  @if (loading()) {
    <div class="flex justify-center py-8">
      <app-spinner size="24" text="Cargando…" />
    </div>
  } @else if (error()) {
    <p class="text-sm text-red-500" style="font-weight: 400">{{ error() }}</p>
  } @else if (data()?.length === 0) {
    <p class="text-sm text-gray-400" style="font-weight: 400">
      Sin ventas en el período seleccionado
    </p>
  } @else {
    <div class="relative" style="min-height: 250px">
      <canvas #salesCanvas></canvas>
    </div>
  }
</div>
