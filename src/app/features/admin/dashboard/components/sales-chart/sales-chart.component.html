@if (loading()) {
  <div class="flex justify-center p-4">
    <app-spinner />
  </div>
} @else if (error()) {
  <div class="p-4 text-red-600 bg-red-50 rounded text-sm">
    {{ error() }}
  </div>
} @else if (data()) {
  <div class="overflow-x-auto">
    <table class="w-full text-sm text-left text-gray-500">
      <thead class="text-xs text-gray-700 uppercase bg-gray-50">
        <tr>
          <th class="px-6 py-3">Periodo</th>
          <th class="px-6 py-3">Ventas</th>
          <th class="px-6 py-3">Órdenes</th>
        </tr>
      </thead>
      <tbody class="divide-y divide-gray-200">
        @for (item of data(); track item.period) {
          <tr class="bg-white hover:bg-gray-50">
            <td class="px-6 py-4">{{ item.period }}</td>
            <td class="px-6 py-4 font-medium text-gray-900">{{ item.totalSales | currency }}</td>
            <td class="px-6 py-4">{{ item.orderCount | number }}</td>
          </tr>
        } @empty {
          <tr>
            <td colspan="3" class="px-6 py-4 text-center">No hay datos disponibles</td>
          </tr>
        }
      </tbody>
    </table>
  </div>
}
