<div class="mx-auto max-w-2xl">
  <div class="mb-8">
    <app-step-indicator [currentStep]="3" />
  </div>

  <h1 class="mb-2 text-center text-2xl text-gray-900" style="font-weight:500">Especificaciones</h1>
  <p class="mb-6 text-center text-sm text-gray-400" style="font-weight:400">Agrega características clave del producto. Completa solo las que necesites.</p>

  <form [formGroup]="form" (ngSubmit)="submit()" class="rounded-2xl border border-gray-200 bg-white p-6 space-y-5">
    <p class="text-xs text-gray-400" style="font-weight:400">Cada fila tiene un nombre (ej: Material) y un valor (ej: Acero inoxidable). Deja vacías las que no uses.</p>

    @for (bullet of bullets.controls; track $index) {
      <div [formGroup]="bullet" class="grid grid-cols-2 gap-3">
        <input formControlName="label" placeholder="Ej: Material"
          class="rounded-lg border border-gray-200 px-4 py-3 text-sm focus:border-orange-500 focus:outline-none focus:ring-2 focus:ring-orange-500/20" />
        <input formControlName="value" placeholder="Ej: Acero inoxidable"
          class="rounded-lg border border-gray-200 px-4 py-3 text-sm focus:border-orange-500 focus:outline-none focus:ring-2 focus:ring-orange-500/20" />
      </div>
    }

    <div class="flex items-center justify-center gap-3 pt-2">
      <button type="submit" [disabled]="saving()"
        class="rounded-lg bg-orange-500 px-4 py-2.5 text-sm text-white hover:bg-orange-600 disabled:cursor-not-allowed disabled:opacity-60" style="font-weight:500">
        {{ saving() ? 'Guardando…' : 'Guardar' }}
      </button>
      <button type="button" (click)="skip()"
        class="rounded-lg border border-gray-200 bg-white px-4 py-2.5 text-sm text-gray-700 hover:border-gray-300" style="font-weight:500">
        Omitir
      </button>
    </div>
  </form>
</div>
