<div class="flex items-center justify-center" style="min-height: calc(100vh - 6rem)">
  <div class="w-full max-w-lg space-y-6">
    <div class="text-center">
      <h1 class="text-2xl text-gray-900" style="font-weight: 500">
        {{ isEdit() ? 'Editar' : 'Nueva' }} marca
      </h1>
      <p class="mt-1 text-sm text-gray-500" style="font-weight: 400">
        {{ isEdit() ? 'Actualizá los datos de la marca' : 'Creá una nueva marca' }}
      </p>
    </div>

    @if (loading()) {
      <div class="flex justify-center py-12">
        <app-spinner size="32" text="Cargando…" />
      </div>
    } @else {
      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-5">
        <div>
          <label for="name" class="block text-sm text-gray-700" style="font-weight: 500"
            >Nombre</label
          >
          <input
            id="name"
            type="text"
            formControlName="name"
            placeholder="Ej: Fender"
            class="mt-1.5 block w-full rounded-md-lg border border-gray-200 px-4 py-3 text-sm focus:border-orange-500 focus:outline-none focus:ring-2 focus:ring-orange-500/20"
          />
        </div>

        <div>
          <label for="description" class="block text-sm text-gray-700" style="font-weight: 500"
            >Descripción</label
          >
          <textarea
            id="description"
            formControlName="description"
            rows="3"
            placeholder="Descripción opcional"
            class="mt-1.5 block w-full rounded-md-lg border border-gray-200 px-4 py-3 text-sm focus:border-orange-500 focus:outline-none focus:ring-2 focus:ring-orange-500/20"
          ></textarea>
        </div>

        <div>
          <label for="logoUrl" class="block text-sm text-gray-700" style="font-weight: 500"
            >URL del logo</label
          >
          <input
            id="logoUrl"
            type="text"
            formControlName="logoUrl"
            placeholder="https://ejemplo.com/logo.png"
            class="mt-1.5 block w-full rounded-md-lg border border-gray-200 px-4 py-3 text-sm focus:border-orange-500 focus:outline-none focus:ring-2 focus:ring-orange-500/20"
          />
        </div>

        <div class="flex items-center justify-center gap-3 pt-2">
          <button
            type="submit"
            [disabled]="form.invalid || saving()"
            class="rounded-md-lg bg-orange-500 px-4 py-2.5 text-sm text-white hover:bg-orange-600 disabled:cursor-not-allowed disabled:opacity-60"
            style="font-weight: 500"
          >
            {{ saving() ? 'Guardando…' : isEdit() ? 'Actualizar' : 'Crear' }}
          </button>
          <a
            routerLink="/admin/brands"
            class="text-sm text-gray-500 hover:text-gray-700"
            style="font-weight: 500"
            >Cancelar</a
          >
        </div>
      </form>
    }
  </div>
</div>
