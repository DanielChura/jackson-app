<div class="flex min-h-dvh font-manrope">
  <div class="flex w-full lg:w-1/2 items-center justify-center p-8">
    <div class="w-full max-w-sm space-y-8">
      <div class="flex flex-col">
        <app-icon name="sparkle" size="36" class="text-jackson-orange" />
        <div class="mt-4 space-y-1">
          <h1 class="text-2xl text-jackson-charcoal font-medium">Bienvenido de vuelta</h1>
          <p class="text-sm text-jackson-text-secondary font-normal">
            Ingresa tu correo y contraseña para acceder a tu cuenta
          </p>
        </div>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-6">
        <div>
          <label for="email" class="block text-sm text-jackson-charcoal font-medium"
            >Correo electrónico</label
          >
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="tu@correo.com"
            class="mt-1.5 block w-full border-0 bg-gray-100 px-4 py-3 text-sm text-jackson-charcoal placeholder-jackson-text-secondary focus:outline-none focus:bg-gray-100 transition-colors"
          />
        </div>

        <div>
          <label for="password" class="block text-sm text-jackson-charcoal font-medium"
            >Contraseña</label
          >
          <input
            id="password"
            type="password"
            formControlName="password"
            placeholder="••••••••"
            class="mt-1.5 block w-full border-0 bg-gray-100 px-4 py-3 text-sm text-jackson-charcoal placeholder-jackson-text-secondary focus:outline-none focus:bg-gray-100 transition-colors"
          />
        </div>

        <button
          type="submit"
          [disabled]="form.invalid || loading()"
          class="w-full bg-jackson-navy px-4 py-3 text-sm text-jackson-white font-medium transition-colors hover:bg-jackson-navy-hover disabled:cursor-not-allowed disabled:opacity-60"
        >
          {{ loading() ? 'Ingresando…' : 'Iniciar sesión' }}
        </button>
      </form>

      <div class="relative">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-gray-100"></div>
        </div>
        <div class="relative flex justify-center text-xs uppercase">
          <span class="bg-jackson-white px-2 text-jackson-text-secondary font-normal">o</span>
        </div>
      </div>

      <p class="text-center text-sm text-jackson-text-secondary font-normal">
        ¿No tienes cuenta?
        <a
          routerLink="/auth/register"
          class="text-jackson-orange hover:text-jackson-orange-hover font-medium"
          >Crear cuenta</a
        >
      </p>
    </div>
  </div>

  <div class="hidden lg:block lg:w-1/2 p-6">
    <div
      class="flex h-full w-full flex-col justify-end bg-cover p-10"
      style="background-image: url('/images/register-bg.webp'); background-position: 15% center"
    >
      <div class="max-w-2xl">
        <p class="text-sm text-jackson-white font-normal">
          Todo empieza con un acorde, con una idea que necesita sonar
        </p>
        <p class="mt-2 text-3xl text-jackson-white leading-tight font-medium">
          El escenario te espera. Solo necesitás el equipo correcto para hacerlo tuyo y que el
          público lo escuche como lo pensaste.
        </p>
      </div>
    </div>
  </div>
</div>
