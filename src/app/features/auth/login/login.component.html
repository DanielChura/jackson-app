<div class="flex min-h-dvh font-manrope">
  <div class="flex w-full lg:w-1/2 items-center justify-center p-8">
    <div class="w-full max-w-sm space-y-8">
      <div class="flex flex-col">
        <app-icon name="sparkle" size="36" class="text-orange-500" />
        <div class="mt-4 space-y-1">
          <h1 class="text-2xl text-gray-900" style="font-weight:500">Bienvenido de vuelta</h1>
          <p class="text-sm text-gray-500" style="font-weight:400">Ingresa tu correo y contraseña para acceder a tu cuenta</p>
        </div>
      </div>

      <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-6">
        <div>
          <label for="email" class="block text-sm text-gray-700" style="font-weight:500">Correo electrónico</label>
          <input
            id="email"
            type="email"
            formControlName="email"
            placeholder="tu@correo.com"
            class="mt-1.5 block w-full rounded-lg border border-gray-200 px-4 py-3 text-sm focus:border-orange-500 focus:outline-none focus:ring-2 focus:ring-orange-500/20"
          />
        </div>

        <div>
          <label for="password" class="block text-sm text-gray-700" style="font-weight:500">Contraseña</label>
          <input
            id="password"
            type="password"
            formControlName="password"
            placeholder="••••••••"
            class="mt-1.5 block w-full rounded-lg border border-gray-200 px-4 py-3 text-sm focus:border-orange-500 focus:outline-none focus:ring-2 focus:ring-orange-500/20"
          />
        </div>

        <button
          type="submit"
          [disabled]="form.invalid || loading()"
          class="w-full rounded-lg bg-orange-500 px-4 py-3 text-sm text-white transition-colors hover:bg-orange-600 disabled:cursor-not-allowed disabled:opacity-60" style="font-weight:500"
        >
          {{ loading() ? 'Ingresando…' : 'Iniciar sesión' }}
        </button>
      </form>

      <div class="relative">
        <div class="absolute inset-0 flex items-center">
          <div class="w-full border-t border-gray-200"></div>
        </div>
        <div class="relative flex justify-center text-xs uppercase">
          <span class="bg-white px-2 text-gray-400" style="font-weight:400">o</span>
        </div>
      </div>

      <p class="text-center text-sm text-gray-500" style="font-weight:400">
        ¿No tienes cuenta?
        <a routerLink="/auth/register" class="text-orange-500 hover:text-orange-600" style="font-weight:500">Crear cuenta</a>
      </p>
    </div>
  </div>

  <div class="hidden lg:block lg:w-1/2 p-6">
    <div class="flex h-full w-full flex-col justify-end rounded-2xl bg-cover p-10" style="background-image: url('/images/register-bg.webp'); background-position: 15% center;">
      <div class="max-w-2xl">
        <p class="text-sm text-white" style="font-weight:400">Todo empieza con un acorde, con una idea que necesita sonar</p>
        <p class="mt-2 text-3xl text-white leading-tight" style="font-weight:500">El escenario te espera. Solo necesitás el equipo correcto para hacerlo tuyo y que el público lo escuche como lo pensaste.</p>
      </div>
    </div>
  </div>
</div>
