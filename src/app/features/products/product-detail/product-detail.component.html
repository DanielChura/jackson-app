<section class="x-auto w-full max-w-[1600px]">
  <div class="px-6 pt-6 pb-2">
    <nav
      aria-label="Breadcrumb"
      class="flex items-center gap-1.5 text-xs text-jackson-text-secondary font-normal"
    >
      <a routerLink="/" class="hover:text-jackson-navy transition-colors">Inicio</a>
      <app-icon name="chevron-right" size="12" class="opacity-40" />
      <a routerLink="/products" class="hover:text-jackson-navy transition-colors">Productos</a>
      @if (product(); as p) {
        <app-icon name="chevron-right" size="12" class="opacity-40" />
        <span class="text-jackson-charcoal font-medium truncate max-w-[200px]">{{ p.name }}</span>
      }
    </nav>
  </div>
  @if (product(); as p) {
    <app-product-info [p]="p" (addToCart)="addToCart()" (toggleFavorite)="toggleFavorite()" />
  }
  <div class="px-6 py-10">
    <app-product-carousel
      [products]="relatedProducts()"
      [title]="'Productos relacionados'"
      [loading]="relatedLoading()"
    />
  </div>
</section>
