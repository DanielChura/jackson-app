<div class="mx-auto w-full max-w-[1600px] px-6 py-8">
  <h1 class="text-3xl text-jackson-charcoal font-medium">Productos</h1>
  <p class="mt-1 text-sm text-jackson-charcoal/50 font-normal">Explorá nuestro catálogo completo</p>

  <div class="mt-8 flex flex-col gap-4 sm:flex-row sm:items-end sm:gap-6">
    <div class="flex-1">
      <label for="search" class="block text-sm text-jackson-charcoal font-medium mb-1.5">Buscar</label>
      <input
        id="search"
        type="text"
        [(ngModel)]="filterName"
        placeholder="Nombre del producto..."
        class="w-full bg-jackson-surface text-jackson-charcoal px-4 py-2.5 text-sm border-0 outline-none focus:bg-jackson-text-secondary/10 transition-colors"
        (keyup.enter)="applyFilters()"
      />
    </div>
    <div class="w-full sm:w-48">
      <label for="category" class="block text-sm text-jackson-charcoal font-medium mb-1.5"
        >Categoría</label
      >
      <select
        id="category"
        [(ngModel)]="filterCategory"
        (change)="applyFilters()"
        class="w-full bg-jackson-surface text-jackson-charcoal px-4 py-2.5 text-sm border-0 outline-none focus:bg-jackson-text-secondary/10 transition-colors"
      >
        <option value="">Todas</option>
        @for (cat of categories(); track cat.id) {
          <option [value]="cat.id">{{ cat.name }}</option>
        }
      </select>
    </div>
    <div class="w-full sm:w-48">
      <label for="brand" class="block text-sm text-jackson-charcoal font-medium mb-1.5">Marca</label>
      <select
        id="brand"
        [(ngModel)]="filterBrand"
        (change)="applyFilters()"
        class="w-full bg-jackson-surface text-jackson-charcoal px-4 py-2.5 text-sm border-0 outline-none focus:bg-jackson-text-secondary/10 transition-colors"
      >
        <option value="">Todas</option>
        @for (brand of brands(); track brand.id) {
          <option [value]="brand.id">{{ brand.name }}</option>
        }
      </select>
    </div>
    <button
      (click)="applyFilters()"
      class="bg-jackson-navy text-white px-6 py-2.5 text-sm font-medium transition-colors hover:bg-jackson-navy-hover"
    >
      Filtrar
    </button>
  </div>

  @if (loading()) {
    <div class="flex justify-center py-20">
      <app-spinner size="32" text="Cargando productos..." />
    </div>
  } @else if (products().length === 0) {
    <div class="py-20 text-center">
      <p class="text-jackson-charcoal/40 font-normal">No se encontraron productos</p>
    </div>
  } @else {
    <p class="mt-8 text-sm text-jackson-charcoal/50 font-normal">{{ totalElements() }} producto(s)</p>
    <div class="mt-4 grid gap-6 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5">
      @for (product of products(); track product.id) {
        <app-product-card [product]="product" />
      }
    </div>
    <div class="mt-8">
      <app-paginator
        [page]="page()"
        [totalPages]="totalPages()"
        [totalElements]="totalElements()"
        label="productos"
        (prev)="prev()"
        (next)="next()"
      />
    </div>
  }
</div>
