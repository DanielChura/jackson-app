<header class="sticky top-0 z-50 w-full bg-white border-b-1 border-gray-300">
  <!-- Promo bar -->
  <div class="bg-orange-500">
    <div class="mx-auto flex max-w-[1600px] items-center justify-center px-6 py-2">
      <p class="text-xs text-white" style="font-weight: 500">
        🎸 Envío gratis en guitarras y teclados — 20% de descuento en audífonos y micrófonos —
        <a routerLink="/products" class="underline hover:no-underline" style="font-weight: 500"
          >Compra ahora</a
        >
      </p>
    </div>
  </div>

  <div class="mx-auto w-full max-w-[1600px] px-6">
    <div class="flex items-center gap-6 py-3">
      <button
        (click)="toggleMobileMenu()"
        class="md:hidden text-gray-500 hover:text-orange-500 transition-colors"
        aria-label="Menú"
      >
        <app-icon name="menu" size="24" />
      </button>

      <a routerLink="/" class="shrink-0" (click)="closeMobileMenu()">
        <img
          src="http://jacksontoolinc.com/wp-content/uploads/2024/08/Jackson-Tool-Header.png"
          alt="Jackson Tool"
          class="h-14 w-auto"
        />
      </a>

      <div class="hidden md:flex flex-1 max-w-md mx-auto relative">
        <app-icon
          name="search"
          size="18"
          class="pointer-events-none absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"
        />
        <input
          type="text"
          placeholder="Buscar productos…"
          class="w-full rounded-lg border border-gray-200 bg-white px-4 py-2.5 pl-11 text-sm focus:border-orange-500 focus:outline-none focus:ring-2 focus:ring-orange-500/20"
          style="font-weight: 400"
        />
      </div>

      <div class="ml-auto flex items-center gap-6">
        <a
          routerLink="/favorites"
          class="hidden sm:block text-gray-500 hover:text-orange-500 transition-colors"
        >
          <app-icon name="heart" size="22" />
        </a>

        <a
          routerLink="/cart"
          class="relative text-gray-500 hover:text-orange-500 transition-colors"
        >
          <app-icon name="shopping-cart" size="22" />
          @if (cartCount()) {
            <span
              class="absolute -right-2 -top-2 flex h-4 w-4 items-center justify-center rounded-full bg-orange-500 text-[10px] text-white"
              style="font-weight: 500"
              >{{ cartCount() }}</span
            >
          }
        </a>

        <app-user-menu (navigate)="closeMobileMenu()" />
      </div>
    </div>

    <div class="md:hidden pb-5">
      <div class="relative">
        <app-icon
          name="search"
          size="18"
          class="pointer-events-none absolute left-4 top-1/2 -translate-y-1/2 text-gray-400"
        />
        <input
          type="text"
          placeholder="Buscar productos…"
          class="w-full rounded-lg border border-gray-200 bg-white px-4 py-2.5 pl-11 text-sm focus:border-orange-500 focus:outline-none focus:ring-2 focus:ring-orange-500/20"
          style="font-weight: 400"
        />
      </div>
    </div>
  </div>

  <div class="hidden border-t border-gray-200 md:block">
    <app-category-nav [links]="categoryLinks" />
  </div>

  @if (mobileMenuOpen()) {
    <div class="border-t border-gray-200 bg-white md:hidden">
      <div class="mx-auto w-full max-w-[1600px] px-6 pb-5 pt-2">
        <div class="flex flex-col gap-1">
          @for (link of categoryLinks; track link.path) {
            <a
              [routerLink]="link.path"
              (click)="closeMobileMenu()"
              class="rounded-lg px-4 py-3 text-gray-700 hover:bg-orange-50 hover:text-orange-600 transition-colors"
              style="font-weight: 500"
              >{{ link.label }}</a
            >
          }
        </div>
        @if (!auth.currentUser()) {
          <div class="mt-3 border-t border-gray-100 pt-3">
            <a
              routerLink="/auth/login"
              (click)="closeMobileMenu()"
              class="flex items-center gap-2 rounded-lg px-4 py-3 text-gray-700 hover:bg-orange-50 hover:text-orange-600 transition-colors"
              style="font-weight: 500"
            >
              <app-icon name="user" size="20" />
              Iniciar sesión
            </a>
          </div>
        }
      </div>
    </div>
  }
</header>
