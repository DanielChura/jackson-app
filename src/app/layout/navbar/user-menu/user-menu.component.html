<div class="relative">
  <button
    (click)="toggle()"
    class="flex items-center gap-1 text-white hover:text-jackson-navy transition-colors focus:outline-2 focus:outline-white"
    [attr.aria-expanded]="userDropdownOpen()"
    aria-haspopup="true"
    aria-label="Menú de usuario"
  >
    <app-icon name="user" size="22" />
    <app-icon name="chevron-down" size="14" class="hidden md:block" />
  </button>
  @if (userDropdownOpen()) {
    <div class="fixed inset-0 z-40" (click)="userDropdownOpen.set(false)"></div>
    <div class="absolute right-0 z-50 pt-2">
      <div class="w-48 rounded-none border border-jackson-navy bg-white py-0">
        @if (auth.currentUser(); as user) {
          <div
            class="bg-jackson-surface px-4 py-2.5 text-xs text-jackson-navy font-medium truncate"
          >
            {{ user.email }}
          </div>
          <a
            routerLink="/account"
            (click)="close()"
            class="block px-4 py-3 text-sm text-jackson-text hover:bg-jackson-navy hover:text-white focus:bg-jackson-navy focus:text-white focus:outline-none transition-colors font-normal"
            >Mi cuenta</a
          >
          <a
            routerLink="/orders"
            (click)="close()"
            class="block px-4 py-3 text-sm text-jackson-text hover:bg-jackson-navy hover:text-white focus:bg-jackson-navy focus:text-white focus:outline-none transition-colors font-normal"
            >Mis pedidos</a
          >
          <button
            (click)="auth.logout(); close()"
            class="w-full px-4 py-3 text-left text-sm text-red-600 hover:bg-red-50 focus:bg-red-50 focus:outline-none transition-colors font-normal"
          >
            Cerrar sesión
          </button>
        } @else {
          <a
            routerLink="/auth/login"
            (click)="close()"
            class="block px-4 py-3 text-sm text-jackson-text hover:bg-jackson-navy hover:text-white focus:bg-jackson-navy focus:text-white focus:outline-none transition-colors font-normal"
            >Iniciar sesión</a
          >
          <a
            routerLink="/auth/register"
            (click)="close()"
            class="block px-4 py-3 text-sm text-jackson-text hover:bg-jackson-navy hover:text-white focus:bg-jackson-navy focus:text-white focus:outline-none transition-colors font-normal"
            >Registrarse</a
          >
        }
      </div>
    </div>
  }
</div>
