<div class="relative">
  <button (click)="toggle()" class="flex items-center gap-1 text-gray-500 hover:text-orange-500 transition-colors">
    <app-icon name="user" size="22" />
    <app-icon name="chevron-down" size="14" class="hidden md:block" />
  </button>
  @if (userDropdownOpen()) {
    <div class="fixed inset-0 z-40" (click)="userDropdownOpen.set(false)"></div>
    <div class="absolute right-0 z-50 pt-2">
      <div class="w-44 rounded-2xl border border-gray-200 bg-white py-1.5">
        @if (auth.currentUser(); as user) {
          <div class="border-b border-gray-100 px-4 py-2 text-sm text-gray-400 truncate" style="font-weight:400">{{ user.email }}</div>
          <a routerLink="/account" (click)="close()" class="block px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 hover:text-orange-500 transition-colors" style="font-weight:400">Mi cuenta</a>
          <a routerLink="/orders" (click)="close()" class="block px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 hover:text-orange-500 transition-colors" style="font-weight:400">Mis pedidos</a>
          <div class="my-1 border-t border-gray-100"></div>
          <button (click)="auth.logout(); close()" class="w-full px-4 py-2.5 text-left text-sm text-red-500 hover:bg-gray-50 transition-colors" style="font-weight:400">Cerrar sesión</button>
        } @else {
          <a routerLink="/auth/login" (click)="close()" class="block px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 hover:text-orange-500 transition-colors" style="font-weight:400">Iniciar sesión</a>
          <a routerLink="/auth/register" (click)="close()" class="block px-4 py-2.5 text-sm text-gray-700 hover:bg-gray-50 hover:text-orange-500 transition-colors" style="font-weight:400">Registrarse</a>
        }
      </div>
    </div>
  }
</div>
