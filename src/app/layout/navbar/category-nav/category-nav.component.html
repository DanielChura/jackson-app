<div class="mx-auto flex w-full max-w-[1600px] items-center gap-6 overflow-x-auto px-6 py-3">
  @for (link of links(); track link.path) {
    <a
      [routerLink]="link.path"
      (click)="navigate.emit()"
      class="whitespace-nowrap text-sm text-white hover:text-white/70 transition-colors font-medium focus:outline-2 focus:outline-white"
      >{{ link.label }}</a
    >
  }
</div>
