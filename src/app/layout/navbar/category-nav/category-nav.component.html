<div class="mx-auto flex w-full max-w-[1600px] items-center gap-6 overflow-x-auto px-6 py-3">
  @for (link of links(); track link.path) {
    <a
      [routerLink]="link.path"
      (click)="navigate.emit()"
      class="whitespace-nowrap text-sm text-gray-600 transition-colors hover:text-orange-500"
      style="font-weight: 500"
      >{{ link.label }}</a
    >
  }
</div>
