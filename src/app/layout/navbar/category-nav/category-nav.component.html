<div class="mx-auto flex max-w-7xl items-center gap-6 overflow-x-auto px-6 py-3">
  @for (link of links(); track link.path) {
    <a [routerLink]="link.path" (click)="navigate.emit()" class="whitespace-nowrap text-sm text-gray-600 transition-colors hover:text-orange-500" style="font-weight:500">{{ link.label }}</a>
  }
  <a routerLink="/trending" (click)="navigate.emit()" class="ml-auto whitespace-nowrap text-sm text-orange-500 transition-colors hover:text-orange-600" style="font-weight:500">Trending</a>
</div>
