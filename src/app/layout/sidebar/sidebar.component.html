<aside class="flex min-h-dvh w-64 flex-col bg-jackson-navy">
  <div class="flex items-center gap-3 border-b border-jackson-white/10 px-6 py-5">
    <app-icon name="sparkle" size="24" class="text-jackson-orange" />
    <span class="text-sm text-jackson-white font-medium">Jackson Admin</span>
  </div>

  <nav class="flex-1 space-y-1 px-3 py-4">
    <a
      routerLink="/admin"
      routerLinkActive="bg-jackson-white/10 text-white"
      [routerLinkActiveOptions]="{ exact: true }"
      class="flex items-center gap-3 px-3 py-2 text-sm text-jackson-text-secondary transition-colors hover:bg-jackson-white/10 hover:text-white font-medium"
    >
      <app-icon name="layout-dashboard" size="18" /> Dashboard
    </a>
    <a
      routerLink="/admin/products"
      routerLinkActive="bg-jackson-white/10 text-white"
      class="flex items-center gap-3 px-3 py-2 text-sm text-jackson-text-secondary transition-colors hover:bg-jackson-white/10 hover:text-white font-medium"
    >
      <app-icon name="package" size="18" /> Productos
    </a>
    <a
      routerLink="/admin/brands"
      routerLinkActive="bg-jackson-white/10 text-white"
      class="flex items-center gap-3 px-3 py-2 text-sm text-jackson-text-secondary transition-colors hover:bg-jackson-white/10 hover:text-white font-medium"
    >
      <app-icon name="tag" size="18" /> Marcas
    </a>
    <a
      routerLink="/admin/categories"
      routerLinkActive="bg-jackson-white/10 text-white"
      class="flex items-center gap-3 px-3 py-2 text-sm text-jackson-text-secondary transition-colors hover:bg-jackson-white/10 hover:text-white font-medium"
    >
      <app-icon name="grid" size="18" /> Categorías
    </a>
    <a
      routerLink="/admin/orders"
      routerLinkActive="bg-jackson-white/10 text-white"
      class="flex items-center gap-3 px-3 py-2 text-sm text-jackson-text-secondary transition-colors hover:bg-jackson-white/10 hover:text-white font-medium"
    >
      <app-icon name="shopping-cart-share" size="18" /> Órdenes
    </a>
    <a
      routerLink="/admin/users"
      routerLinkActive="bg-jackson-white/10 text-white"
      class="flex items-center gap-3 px-3 py-2 text-sm text-jackson-text-secondary transition-colors hover:bg-jackson-white/10 hover:text-white font-medium"
    >
      <app-icon name="users" size="18" /> Usuarios
    </a>
    <a
      routerLink="/admin/inventory"
      routerLinkActive="bg-jackson-white/10 text-white"
      class="flex items-center gap-3 px-3 py-2 text-sm text-jackson-text-secondary transition-colors hover:bg-jackson-white/10 hover:text-white font-medium"
    >
      <app-icon name="clipboard-list" size="18" /> Inventario
    </a>
  </nav>

  <div class="border-t border-jackson-white/10 px-3 py-4">
    <a
      routerLink="/"
      class="flex items-center gap-3 px-3 py-2 text-sm text-jackson-text-secondary transition-colors hover:bg-jackson-white/10 hover:text-white font-medium"
    >
      <app-icon name="sparkle" size="18" /> Ir a la tienda
    </a>
    <button
      (click)="auth.logout()"
      class="flex w-full items-center gap-3 px-3 py-2 text-sm text-jackson-text-secondary transition-colors hover:bg-jackson-white/10 hover:text-white font-medium"
    >
      Cerrar sesión
    </button>
  </div>
</aside>
