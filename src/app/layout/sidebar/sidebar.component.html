<aside class="flex min-h-dvh w-64 flex-col bg-jackson-navy">
  <div class="flex items-center gap-3 border-b border-jackson-white/10 px-6 py-5">
    <app-icon name="sparkle" size="24" class="text-jackson-orange" aria-hidden="true" />
    <span class="text-sm text-jackson-white font-medium">Jackson Admin</span>
  </div>

  <nav class="flex-1 space-y-1 px-3 py-4" aria-label="Menú principal">
    @for (navItem of navItems; track navItem.label) {
      <a
        routerLink="{{ navItem.path }}"
        routerLinkActive="bg-jackson-white/10"
        [routerLinkActiveOptions]="{ exact: true }"
        class="flex items-center w-full gap-3 px-3 py-2 text-sm text-white/60 rounded-md transition-colors hover:bg-jackson-white/10 hover:text-white"
      >
        <app-icon [name]="navItem.icon" size="18" aria-hidden="true" /> {{ navItem.label }}
      </a>
    }
  </nav>

  <div class="border-t border-jackson-white/10 px-3 py-4">
    <a
      routerLink="/"
      class="flex items-center w-full gap-3 px-3 py-2 text-sm text-white/60 rounded-md transition-colors hover:bg-jackson-white/10 hover:text-white"
    >
      <app-icon name="sparkle" size="18" aria-hidden="true" /> Ir a la tienda
    </a>
    <button
      type="button"
      (click)="auth.logout()"
      class="flex items-center w-full gap-3 px-3 py-2 text-sm text-white/60 rounded-md transition-colors hover:bg-jackson-white/10 hover:text-white"
    >
      <app-icon name="log-out" size="18" aria-hidden="true" /> Cerrar sesión
    </button>
  </div>
</aside>
