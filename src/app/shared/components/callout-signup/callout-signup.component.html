<section>
  <div
    class="relative overflow-hidden rounded-2xl bg-jackson-orange bg-cover bg-center px-8 py-20 xl:px-16 xl:py-24 trans"
    [style.backgroundImage]="'url(/images/jackson-bg.webp)'"
  >
    <img
      src="/images/collection01.png"
      alt=""
      class="absolute top-[-20px] right-[-20px] w-150 hidden lg:block xl:w-200 2xl:top-[-80px] xl:top-[-80px] xl:right-[-40px] brightness-110 contrast-110 saturate-150"
    />

    <div class="max-w-lg text-center mx-auto lg:text-left lg:mx-0">
      <h2 class="text-2xl font-medium tracking-tight text-white md:text-3xl">
        {{ config().headline }}
      </h2>
      <p class="mt-3 text-base font-normal leading-relaxed text-white/80">
        {{ config().subcopy }}
      </p>

      <div class="mt-8 flex flex-row gap-3 max-w-md mx-auto lg:mx-0">
        <label for="email-callout" class="sr-only">Correo electrónico</label>
        <input
          id="email-callout"
          type="email"
          autocomplete="email"
          placeholder="Tu correo electrónico"
          class="min-w-0 flex-1 rounded-md border-0 bg-white px-5 py-3 text-sm text-jackson-charcoal placeholder-jackson-text-secondary focus:outline-none focus:ring-2 focus:ring-white"
        />
        <button
          type="submit"
          class="shrink-0 rounded-md bg-white px-5 py-3 text-jackson-navy hover:bg-gray-100 focus-visible:outline-white"
        >
          <app-icon name="send" size="20" />
        </button>
      </div>

      @if (config().finePrint) {
        <p class="mt-3 text-xs font-normal text-white/75">
          {{ config().finePrint }}
        </p>
      }
    </div>
  </div>
</section>
