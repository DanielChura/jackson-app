<div class="mx-auto w-full max-w-[1600px]">
  <div
    class="relative overflow-hidden rounded-2xl bg-jackson-navy px-6 py-20 xl:px-16 xl:py-24"
    style="
      background-image: url('/images/jackson-bg.webp');
      background-size: cover;
      background-position: center;
    "
  >
    <img
      src="/images/footer-gibson-custom.png"
      alt=""
      class="absolute top-0 right-10 w-[35rem] hidden xl:block"
    />

    <div class="max-w-lg text-center mx-auto xl:text-left xl:mx-0">
      <h2 class="text-2xl font-medium tracking-tight text-white lg:text-3xl">
        {{ config().headline }}
      </h2>
      <p class="mt-3 text-base font-normal leading-relaxed text-white/80">
        {{ config().subcopy }}
      </p>

      <div class="mt-8 flex flex-row gap-3 max-w-md mx-auto xl:mx-0">
        <label for="email-callout" class="sr-only">Correo electrónico</label>
        <input
          id="email-callout"
          type="email"
          autocomplete="email"
          placeholder="Tu correo electrónico"
          class="min-w-0 flex-1 rounded-md border-0 bg-white px-5 py-3 text-sm text-jackson-charcoal placeholder-jackson-text-secondary focus:outline-none focus:ring-2 focus:ring-white"
        />
        <button
          type="submit"
          class="shrink-0 rounded-md bg-white px-5 py-3 text-jackson-navy hover:bg-jackson-surface focus-visible:outline-white"
        >
          <app-icon name="send" size="20" />
        </button>
      </div>

      @if (config().finePrint) {
        <p class="mt-3 text-xs font-normal text-white/50">
          {{ config().finePrint }}
        </p>
      }
    </div>
  </div>
</div>
