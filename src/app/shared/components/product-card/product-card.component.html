<a [routerLink]="['/products', product().id]" class="flex flex-col rounded-none bg-jackson-white">
  <div class="relative aspect-[3/4] overflow-hidden rounded-none bg-jackson-surface">
    @if ((product().images ?? []).length > 0) {
      <img
        [src]="product().images[0].url"
        [alt]="product().name"
        class="h-full w-full object-cover"
        loading="lazy"
      />
    } @else {
      <app-no-image-placeholder text="Sin imagen" />
    }
  </div>

  <div class="flex flex-col gap-1.5 p-5">
    @if (product().category) {
      <span class="text-xs text-jackson-cyan font-medium">
        {{ product().category!.name }}
      </span>
    }
    <h3 class="line-clamp-2 text-sm leading-snug text-jackson-text font-medium">
      {{ product().name }}
    </h3>
    <div class="mt-1 flex items-center justify-between">
      <p class="text-lg text-jackson-text font-medium">S/ {{ product().price }}</p>
      @if (product().stock > 0) {
        <span
          class="rounded-none bg-jackson-surface px-2 py-0.5 text-xs text-jackson-cyan font-medium"
        >
          Stock
        </span>
      }
    </div>
    @if (product().stock === 0) {
      <p class="text-sm text-jackson-text/40 font-normal">Agotado</p>
    }
  </div>
</a>
