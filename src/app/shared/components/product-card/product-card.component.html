<a [routerLink]="['/products', product().id]" class="flex flex-col rounded-none bg-white">
  <div class="relative aspect-[3/4] overflow-hidden rounded-none bg-gray-100">
    @if (product().image) {
      <img
        [src]="product().image"
        [alt]="product().name"
        class="h-full w-full object-cover"
        loading="lazy"
      />
    } @else {
      <div class="flex h-full items-center justify-center">
        @if (iconName(); as icon) {
          <app-icon [name]="icon" size="48" class="text-gray-300" />
        }
      </div>
    }
  </div>

  <div class="flex flex-col gap-1.5 p-5">
    @if (product().category) {
      <span class="text-xs text-orange-600" style="font-weight: 500">
        {{ product().category!.name }}
      </span>
    }
    <h3 class="line-clamp-2 text-sm leading-snug text-gray-900" style="font-weight: 500">
      {{ product().name }}
    </h3>
    <div class="mt-1 flex items-center justify-between">
      <p class="text-lg text-gray-900" style="font-weight: 500">S/ {{ product().price }}</p>
      @if (product().stock > 0) {
        <span
          class="rounded-none bg-green-50 px-2 py-0.5 text-xs text-green-700"
          style="font-weight: 500"
        >
          Stock
        </span>
      }
    </div>
    @if (product().stock === 0) {
      <p class="text-sm text-gray-400" style="font-weight: 400">Agotado</p>
    }
  </div>
</a>
