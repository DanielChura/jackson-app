@if (errorService.current(); as error) {
  <div class="fixed inset-0 z-50 flex items-center justify-center bg-black/10 backdrop-blur-[1px]">
    <div class="w-full max-w-md rounded-2xl border border-none bg-white">
      <header class="px-6 pt-6">
        <div class="flex items-center gap-3">
          <div class="flex h-10 w-10 shrink-0 items-center justify-center rounded-full bg-red-100">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="20"
              height="20"
              viewBox="0 0 24 24"
              fill="none"
              stroke="#ef4444"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path
                d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0zM12 9v4M12 17h.01"
              />
            </svg>
          </div>
          <div>
            <p class="text-sm text-gray-900" style="font-weight: 500">
              {{ error.status }} — {{ error.error }}
            </p>
            <p class="text-xs text-gray-400" style="font-weight: 400">{{ error.message }}</p>
          </div>
        </div>
      </header>

      <main class="px-6 py-4">
        <div class="border-l-4 border-orange-500 rounded-sm bg-orange-50 p-4 pl-5">
          <p
            class="text-sm leading-relaxed text-gray-700"
            style="font-weight: 400"
            [innerHTML]="description(error.status)"
          ></p>
        </div>
      </main>

      <footer class="flex items-center justify-between border-t border-gray-100 px-6 pb-6 pt-4">
        <span class="text-xs text-gray-400" style="font-weight: 400">{{
          error.timestamp | date: 'short'
        }}</span>
        <button
          (click)="errorService.clear()"
          class="rounded-lg bg-orange-500 px-4 py-2 text-sm text-white hover:bg-orange-600"
          style="font-weight: 500"
        >
          Cerrar
        </button>
      </footer>
    </div>
  </div>
}
