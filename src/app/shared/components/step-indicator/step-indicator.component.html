<div class="flex items-center justify-center gap-0">
  @for (step of steps; track step.number; let last = $last) {
    <div class="flex items-center">
      <div class="flex flex-col items-center gap-1.5">
        @if (step.number < currentStep()) {
          <div
            class="flex h-8 w-8 items-center justify-center rounded-md border-2 border-orange-500 bg-orange-500 text-sm text-white"
            style="font-weight: 500"
          >
            <svg
              xmlns="http://www.w3.org/2000/svg"
              class="h-4 w-4"
              fill="none"
              viewBox="0 0 24 24"
              stroke="currentColor"
              stroke-width="2.5"
            >
              <path stroke-linecap="round" stroke-linejoin="round" d="M4.5 12.75l6 6 9-13.5" />
            </svg>
          </div>
        } @else if (step.number === currentStep()) {
          <div
            class="flex h-8 w-8 items-center justify-center rounded-md border-2 border-orange-500 bg-orange-500 text-sm text-white"
            style="font-weight: 500"
          >
            {{ step.number }}
          </div>
        } @else {
          <div
            class="flex h-8 w-8 items-center justify-center rounded-md border-2 border-gray-300 bg-white text-sm text-gray-400"
            style="font-weight: 500"
          >
            {{ step.number }}
          </div>
        }
        <span
          class="text-xs"
          [class.text-orange-500]="step.number === currentStep()"
          [class.text-gray-400]="step.number > currentStep()"
          [class.text-gray-600]="step.number < currentStep()"
          style="font-weight: 500"
        >
          {{ step.label }}
        </span>
      </div>
      @if (!last) {
        <div
          class="mx-2 h-px w-16"
          [class.bg-orange-500]="step.number < currentStep()"
          [class.bg-gray-200]="step.number >= currentStep()"
        ></div>
      }
    </div>
  }
</div>
